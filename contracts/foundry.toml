[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
optimizer = true
optimizer_runs = 200
solc_version = "0.8.24"
evm_version = "cancun"
gas_reports = ["ZKNativeVerifier", "PrivateVoting"]
fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
polkadot_hub_testnet = "${POLKADOT_HUB_RPC}"
localhost = "http://127.0.0.1:8545"

[etherscan]
polkadot_hub_testnet = { key = "${ETHERSCAN_API_KEY}", url = "${BLOCKSCOUT_URL}" }

[fuzz]
runs = 500

[invariant]
runs = 100
depth = 20
