name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Solidity Contracts ─────────────────────────────────────────────────────
  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install OZ and forge-std
        working-directory: contracts
        run: |
          forge install foundry-rs/forge-std --no-commit
          forge install OpenZeppelin/openzeppelin-contracts --no-commit

      - name: Build contracts
        working-directory: contracts
        run: forge build --sizes

      - name: Run tests
        working-directory: contracts
        run: forge test -vvv

      - name: Gas report
        working-directory: contracts
        run: forge test --gas-report

  # ─── Rust PVM Verifier ──────────────────────────────────────────────────────
  rust:
    name: Rust PVM Verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pvm-verifier/target
          key: cargo-${{ hashFiles('pvm-verifier/Cargo.lock') }}

      - name: Build (std)
        working-directory: pvm-verifier
        run: cargo build --release

      - name: Run tests
        working-directory: pvm-verifier
        run: cargo test

      - name: Clippy
        working-directory: pvm-verifier
        run: cargo clippy -- -D warnings

      - name: Rustfmt
        working-directory: pvm-verifier
        run: cargo fmt --check

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_RPC_URL: https://westend-asset-hub-eth-rpc.polkadot.io
          NEXT_PUBLIC_ZKNATIVE_VERIFIER_ADDRESS: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_PRIVATE_VOTING_ADDRESS: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_ZKN_TOKEN_ADDRESS: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: placeholder
          NEXT_PUBLIC_CHAIN_ID: '420420421'
