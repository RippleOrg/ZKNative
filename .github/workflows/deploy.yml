name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'polkadot_hub_testnet'
        type: choice
        options:
          - polkadot_hub_testnet
          - localhost

jobs:
  deploy-contracts:
    name: Deploy Contracts
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.network || 'polkadot_hub_testnet' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        working-directory: contracts
        run: |
          forge install foundry-rs/forge-std --no-commit
          forge install OpenZeppelin/openzeppelin-contracts --no-commit

      - name: Build
        working-directory: contracts
        run: forge build

      - name: Deploy to Polkadot Hub Testnet
        working-directory: contracts
        run: |
          forge script script/Deploy.s.sol \
            --rpc-url ${{ secrets.POLKADOT_HUB_RPC }} \
            --private-key ${{ secrets.DEPLOYER_PRIVATE_KEY }} \
            --broadcast \
            --verify \
            --etherscan-api-key ${{ secrets.ETHERSCAN_API_KEY }} \
            -vvvv
        env:
          POLKADOT_HUB_RPC: ${{ secrets.POLKADOT_HUB_RPC }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          BLOCKSCOUT_URL: ${{ secrets.BLOCKSCOUT_URL }}

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ github.sha }}
          path: contracts/broadcast/

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-contracts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: frontend
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
